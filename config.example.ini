[camera]
# IP-Adresse oder Hostname der Reolink-Kamera
host = 192.168.1.100
# Benutzername und Passwort der Kamera
user = admin
password = DEIN_PASSWORT
# Kamera-Kanal (0 = erste Kamera)
channel = 0
# HTTP-Timeout in Sekunden
timeout = 15

[nas]
# NFS-Mountpunkt auf diesem System (muss bereits gemountet sein)
path = /mnt/qnap/timelapse
# Präfix für den Dateinamen: PREFIX_YYYY-MM-DD_HH-MM-SS.jpg
filename_prefix = snapshot
